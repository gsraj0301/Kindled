{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Kindled{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="icon" type="image/x-icon" href="{% static 'favicon/favicon.ico' %}">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon/favicon-32x32.png' %}">
  <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon/favicon-16x16.png' %}">
  <link rel="apple-touch-icon" href="{% static 'favicon/apple-touch-icon.png' %}">
</head>
<body>

<nav>
  <a href="{% url 'home' %}" class="nav-logo">
    <img src="{% static 'logo.png' %}" alt="Kindled" width="34" height="34">
    Kindled
  </a>

  <span class="nav-tagline">Kindling a fire for learning</span>

  <div class="nav-actions">
    <div class="search-wrapper">
      <input type="text" class="search-input" id="searchInput" placeholder="Search videos…" autocomplete="off">
      <button class="nav-icon-btn" id="searchToggle" title="Search" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
    <button class="suggest-btn" onclick="window.location.href='{% url 'suggest' %}'">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      Suggest a video
    </button>
  </div>
</nav>

{% block content %}{% endblock %}

<footer class="site-footer">
  <p>&copy; <span id="year"></span> All rights reserved by Raj G</p>
</footer>

<script>document.getElementById('year').textContent = new Date().getFullYear();</script>

</body>
</html>
