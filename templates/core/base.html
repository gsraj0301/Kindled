{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Kindled{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>

<nav>
  <a href="{% url 'home' %}" class="nav-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M12 2C12 2 7 8 7 13a5 5 0 0010 0c0-2-1-4-2-5 0 0 0 3-2 4-1-2-1-4-1-4S8 11 8 13a4 4 0 008 0c0-4-4-11-4-11z" fill="#F97316"/>
    </svg>
    Kindled
  </a>

  <span class="nav-tagline">Kindling a fire for learning</span>

  <div class="nav-actions">
    <button class="nav-icon-btn" title="Search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
    <button class="suggest-btn" onclick="window.location.href='{% url 'suggest' %}'">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      Suggest a video
    </button>
  </div>
</nav>

{% block content %}{% endblock %}

<footer class="site-footer">
  <p>&copy; <span id="year"></span> All rights reserved by Raj G</p>
</footer>

<script>document.getElementById('year').textContent = new Date().getFullYear();</script>

</body>
</html>
